baseURL: https://flock137.github.io/
languageCode: en-us
title: Flock137
theme: electric-cyberpunk
pagination:
  pagerSize: 9

timeZone: "Asia/Bangkok"

params:
  tagline: "Hi there, welcome to my (technical) blog site 👋"
  defaultTheme: dark

menu:
  main:
  - identifier: posts
    name: Blog
    url: /posts/
    weight: 10
  - identifier: daily-tips
