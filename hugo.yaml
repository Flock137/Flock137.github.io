    url: /daily-tips/
    weight: 20

markup:
  tableOfContents:
    startLevel: 2
    endLevel: 4
  highlight:
    style: dracula
    lineNos: true
    lineNumbersInTable: false

caches:
  images:
    dir: :cacheDir/images
